name: Deploy para produção

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch a ser deployada no servidor"
        required: true
        default: "main"

concurrency:
  group: producao-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Definir branch alvo
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TARGET_BRANCH: ${{ steps.vars.outputs.branch }}
        run: |
          set -e
          SSH_USER="ubuntu"
          SSH_HOST="35.168.67.97"
          [ -n "$SSH_KEY" ] || { echo "::error::Secret SSH_KEY ausente ou vazio"; exit 1; }
          echo "Secrets presentes. User=$SSH_USER Host=$SSH_HOST Branch=$TARGET_BRANCH"

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub 2>/tmp/keyerr; then
            echo "::error::SSH_KEY com formato invalido. Cole a chave PRIVADA inteira (linhas BEGIN/END). Detalhe:"
            cat /tmp/keyerr
            exit 1
          fi
          echo "Chave carregada OK. Publica derivada:"; cat ~/.ssh/deploy_key.pub

          echo "Conectando em $SSH_USER@$SSH_HOST (porta 22)..."
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" \
            "SMTP_HOST='$SMTP_HOST' SMTP_PORT='$SMTP_PORT' SMTP_USER='$SMTP_USER' SMTP_PASS='$SMTP_PASS' bash /var/www/desvios-hse/deploy.sh '$TARGET_BRANCH'"
