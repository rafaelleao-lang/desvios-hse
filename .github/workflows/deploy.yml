name: Deploy para produção

# Dispara automaticamente em push na main e permite execução manual.
# Observação: enquanto a 'main' não contiver a versão MySQL/RDS (atualmente
# na branch 'damasio'), use o disparo manual (workflow_dispatch) informando
# a branch desejada, ou consolide as branches antes de ativar o push->main.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch a ser deployada no servidor"
        required: true
        default: "main"

concurrency:
  group: producao-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Definir branch alvo
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          TARGET_BRANCH: ${{ steps.vars.outputs.branch }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "/var/www/desvios-hse/deploy.sh '$TARGET_BRANCH'"
